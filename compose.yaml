services:
  # データベース
  metateam_academy_mysql:
    build: ./docker/mysql
    container_name: 'metateam_academy_mysql'
    volumes:
      - ./docker/mysql/logs:/var/log/mysql # コンテナのログを同期
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d
      - db-store:/var/lib/mysql
    ports:
      - 3306:3306

  # ストレージ
  metateam_academy_minio:
    build: ./docker/minio
    container_name: metateam_academy_minio
    volumes:
      - ./docker/minio:/export
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ['server', '/export', '--console-address', ':9001']

  # アプリ本体
  metateam_academy_app:
    build: ./docker/mt_library
    container_name: metateam_academy_app
    tty: true
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - 8080:8080 # 通常実行用
      - 5005:5005 # デバッグ用

  frontend:
    build:
      context: ./
      dockerfile: ./docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/var/www/html/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c 'npm install && npm run start'
volumes:
  db-store:
